<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embed Clean Player - No Popup</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: black;
            font-family: Arial, sans-serif;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            z-index: 1000;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(255,0,0,0.7);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 1001;
            max-width: 80%;
            word-break: break-all;
        }
        #debug-info {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: #666;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 5px;
            border-radius: 3px;
            z-index: 10000;
            display: none;
        }
        #video-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: none;
        }
        #video-player {
            width: 100%;
            height: 100%;
            border: none;
        }
        #popup-blocker-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 9999;
            pointer-events: none;
        }
        .blocker-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #ff4444;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 10000;
            border: 1px solid #ff4444;
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Memuat konten...</div>
    </div>
    <div id="error-message"></div>
    <div id="debug-info"></div>
    
    <div id="video-container">
        <iframe id="video-player" 
                sandbox="allow-same-origin allow-scripts allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-downloads"
                allow="autoplay; encrypted-media; picture-in-picture"
                allowfullscreen>
        </iframe>
    </div>
    
    <div id="popup-blocker-overlay"></div>
    <div id="blocker-message" class="blocker-message">🚫 Popup diblokir!</div>

    <script>
        (function() {
            'use strict';
            
            // Aktifkan debug mode (hapus atau set false untuk production)
            const DEBUG = true;
            
            function debug(message) {
                if (DEBUG) {
                    console.log('[DEBUG]', message);
                    const debugEl = document.getElementById('debug-info');
                    debugEl.style.display = 'block';
                    debugEl.innerHTML = message;
                }
            }
            
            // Konfigurasi
            const BLOCKED_DOMAINS = [
                'effectivegatecpm.com',
                'pl25835327.effectivegatecpm.com',
                'go.effectivegatecpm.com',
                'cdn.effectivegatecpm.com',
                'popup',
                'adserver',
                'doubleclick',
                'googleadservices'
            ];
            
            // === PERBAIKAN UTAMA: Cara mengambil URL ===
            debug('Mencoba mengambil parameter URL...');
            
            // Ambil seluruh query string
            const queryString = window.location.search;
            debug('Query string: ' + queryString);
            
            // Cara 1: Menggunakan URLSearchParams (standar)
            let targetUrl = null;
            
            try {
                const urlParams = new URLSearchParams(queryString);
                
                // Coba ambil dari parameter 'url' (seperti di skrip asli)
                targetUrl = urlParams.get('url');
                debug('URL dari parameter "url": ' + targetUrl);
                
                // Jika tidak ada, coba dari parameter 'link' (sesuai skrip lo.html)
                if (!targetUrl) {
                    targetUrl = urlParams.get('link');
                    debug('URL dari parameter "link": ' + targetUrl);
                }
                
                // Jika masih tidak ada, coba ambil semua parameter
                if (!targetUrl) {
                    // Ambil parameter pertama yang ditemukan
                    for (let [key, value] of urlParams.entries()) {
                        if (value && value.startsWith('http')) {
                            targetUrl = value;
                            debug('URL dari parameter pertama: ' + key + ' = ' + value);
                            break;
                        }
                    }
                }
            } catch (e) {
                debug('Error dengan URLSearchParams: ' + e.message);
            }
            
            // Cara 2: Parse manual jika URLSearchParams gagal
            if (!targetUrl && queryString) {
                debug('Mencoba parsing manual...');
                // Hapus tanda ? di awal
                const query = queryString.substring(1);
                const pairs = query.split('&');
                
                for (let pair of pairs) {
                    const eqIndex = pair.indexOf('=');
                    if (eqIndex > 0) {
                        const key = pair.substring(0, eqIndex);
                        let value = pair.substring(eqIndex + 1);
                        
                        // Decode value
                        try {
                            value = decodeURIComponent(value);
                        } catch (e) {}
                        
                        if (value && (value.startsWith('http://') || value.startsWith('https://'))) {
                            targetUrl = value;
                            debug('URL ditemukan manual: ' + key + ' = ' + value);
                            break;
                        }
                    }
                }
            }
            
            // Cara 3: Cek apakah URL langsung diberikan setelah ?
            if (!targetUrl && queryString && queryString.length > 1) {
                // Mungkin URL langsung tanpa parameter name
                let possibleUrl = queryString.substring(1);
                try {
                    possibleUrl = decodeURIComponent(possibleUrl);
                    if (possibleUrl.startsWith('http://') || possibleUrl.startsWith('https://')) {
                        targetUrl = possibleUrl;
                        debug('URL langsung: ' + possibleUrl);
                    }
                } catch (e) {}
            }
            
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error-message');
            const videoContainer = document.getElementById('video-container');
            const videoPlayer = document.getElementById('video-player');
            const blockerMessage = document.getElementById('blocker-message');
            
            // Validasi URL
            if (!targetUrl) {
                const errorMsg = 'Tidak ada URL yang diberikan. Query: ' + queryString;
                debug(errorMsg);
                showError(errorMsg);
                return;
            }
            
            // Bersihkan URL dari encoding ganda
            try {
                // Decode sampai benar-benar URL yang valid
                let decodedUrl = targetUrl;
                while (decodedUrl.includes('%')) {
                    try {
                        const testDecode = decodeURIComponent(decodedUrl);
                        if (testDecode === decodedUrl) break;
                        decodedUrl = testDecode;
                    } catch (e) {
                        break;
                    }
                }
                targetUrl = decodedUrl;
                debug('URL setelah decoding: ' + targetUrl);
                
                // Validasi URL
                new URL(targetUrl);
                debug('URL valid');
            } catch (e) {
                const errorMsg = 'URL tidak valid: ' + targetUrl + ' - Error: ' + e.message;
                debug(errorMsg);
                showError(errorMsg);
                return;
            }
            
            function showError(message) {
                loadingEl.style.display = 'none';
                errorEl.textContent = message;
                errorEl.style.display = 'block';
            }
            
            function showBlockerNotification() {
                blockerMessage.style.display = 'block';
                setTimeout(() => {
                    blockerMessage.style.display = 'none';
                }, 2000);
            }
            
            // ... (fungsi blockPopups dan lainnya sama seperti sebelumnya) ...
            // [Sisipkan semua fungsi blocker dari kode sebelumnya di sini]
            
            // Untuk menghemat space, saya akan menulis ulang fungsi utamanya:
            
            // STRATEGI 1: Override fungsi popup
            (function blockPopups() {
                const originalOpen = window.open;
                const originalAlert = window.alert;
                const originalConfirm = window.confirm;
                const originalPrompt = window.prompt;
                
                window.open = function(url, name, features) {
                    if (url && BLOCKED_DOMAINS.some(domain => url.includes(domain))) {
                        console.log('[Popup Blocked]', url);
                        showBlockerNotification();
                        return null;
                    }
                    if (url) {
                        try {
                            const urlObj = new URL(url, window.location.origin);
                            if (!BLOCKED_DOMAINS.some(domain => urlObj.hostname.includes(domain))) {
                                return originalOpen.call(window, url, name, features);
                            }
                        } catch (e) {
                            if (!BLOCKED_DOMAINS.some(domain => url.includes(domain))) {
                                return originalOpen.call(window, url, name, features);
                            }
                        }
                    }
                    showBlockerNotification();
                    return null;
                };
                
                window.alert = function(message) {
                    if (message && (message.toLowerCase().includes('ad') || message.toLowerCase().includes('iklan'))) {
                        showBlockerNotification();
                        return;
                    }
                    return originalAlert.call(window, message);
                };
                
                window.confirm = function(message) {
                    if (message && (message.toLowerCase().includes('ad') || message.toLowerCase().includes('iklan'))) {
                        showBlockerNotification();
                        return false;
                    }
                    return originalConfirm.call(window, message);
                };
                
                window.prompt = function(message) {
                    if (message && (message.toLowerCase().includes('ad') || message.toLowerCase().includes('iklan'))) {
                        showBlockerNotification();
                        return null;
                    }
                    return originalPrompt.call(window, message);
                };
            })();
            
            // Fungsi utama loading
            async function loadContent() {
                try {
                    debug('Mencoba memuat: ' + targetUrl);
                    
                    // Coba proxy
                    const proxies = [
                        `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
                        `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,
                        `https://thingproxy.freeboard.io/fetch/${encodeURIComponent(targetUrl)}`
                    ];
                    
                    let html = null;
                    let proxyUsed = null;
                    
                    for (const proxy of proxies) {
                        try {
                            debug('Mencoba proxy: ' + proxy);
                            const response = await fetch(proxy, { 
                                timeout: 10000,
                                headers: {
                                    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                                }
                            });
                            if (response.ok) {
                                html = await response.text();
                                proxyUsed = proxy;
                                debug('Proxy berhasil: ' + proxy);
                                break;
                            }
                        } catch (e) {
                            debug('Proxy gagal: ' + e.message);
                            continue;
                        }
                    }
                    
                    if (!html) {
                        debug('Semua proxy gagal, fallback ke direct URL');
                        // Fallback: langsung akses URL
                        videoPlayer.src = targetUrl;
                        loadingEl.style.display = 'none';
                        videoContainer.style.display = 'block';
                        return;
                    }
                    
                    // Bersihkan HTML
                    BLOCKED_DOMAINS.forEach(domain => {
                        const patterns = [
                            `<script[^>]*src=["'][^"']*${domain.replace(/\./g, '\\.')}[^"']*["'][^>]*>\\s*<\\/script>`,
                            `<script[^>]*>[^<]*${domain.replace(/\./g, '\\.')}[^<]*<\\/script>`,
                            `<iframe[^>]*src=["'][^"']*${domain.replace(/\./g, '\\.')}[^"']*["'][^>]*>\\s*<\\/iframe>`,
                            `<a[^>]*href=["'][^"']*${domain.replace(/\./g, '\\.')}[^"']*["'][^>]*>.*?<\\/a>`
                        ];
                        
                        patterns.forEach(pattern => {
                            const regex = new RegExp(pattern, 'gi');
                            html = html.replace(regex, '');
                        });
                    });
                    
                    // Suntikkan anti-popup script
                    const antiPopupScript = `
                        <script>
                            (function() {
                                const noop = function() { return null; };
                                const blockFunctions = ['open', 'alert', 'confirm', 'prompt', 'print', 'showModalDialog', 'showModelessDialog'];
                                blockFunctions.forEach(func => { try { window[func] = noop; } catch(e) {} });
                                
                                setInterval(function() {
                                    const iframes = document.querySelectorAll('iframe');
                                    iframes.forEach(iframe => {
                                        const style = window.getComputedStyle(iframe);
                                        if (style.display === 'none' || style.visibility === 'hidden' || iframe.width === '0' || iframe.height === '0') {
                                            if (!iframe.closest('#video-player')) iframe.remove();
                                        }
                                    });
                                }, 500);
                            })();
                        <\/script>
                    `;
                    
                    html = html.replace('<head>', '<head>' + antiPopupScript);
                    
                    // Gunakan blob URL
                    const blob = new Blob([html], { type: 'text/html' });
                    const blobUrl = URL.createObjectURL(blob);
                    
                    videoPlayer.src = blobUrl;
                    
                    loadingEl.style.display = 'none';
                    videoContainer.style.display = 'block';
                    
                    videoPlayer.onload = function() {
                        URL.revokeObjectURL(blobUrl);
                        debug('Konten berhasil dimuat');
                    };
                    
                } catch (error) {
                    debug('Error fatal: ' + error.message);
                    showError('Gagal memuat: ' + error.message);
                    
                    // Ultimate fallback
                    videoPlayer.src = targetUrl;
                    loadingEl.style.display = 'none';
                    videoContainer.style.display = 'block';
                }
            }
            
            // Mulai loading
            loadContent();
            
        })();
    </script>
</body>
</html>
