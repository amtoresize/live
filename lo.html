<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 Zero-Popup Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }
        
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            z-index: 10000;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(255,0,0,0.9);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            z-index: 10001;
            display: none;
            max-width: 80%;
        }
        
        #player-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            background: #000;
            z-index: 1;
        }
        
        #kill-switch-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: transparent;
            z-index: 999999;
            pointer-events: none;
        }
        
        #blocker-stats {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            z-index: 1000000;
            border: 1px solid #0f0;
            display: none;
        }
        
        .popup-alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ff4444;
            color: white;
            padding: 20px;
            border-radius: 10px;
            z-index: 1000001;
            font-size: 20px;
            text-align: center;
            animation: pulse 0.5s;
            display: none;
        }
        
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.8); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Mengaktifkan protokol anti-popup...</div>
    </div>
    
    <div id="error-message"></div>
    <div id="popup-alert" class="popup-alert">🚫 POPUP DIBLOKIR!</div>
    <div id="blocker-stats">🛡️ Blocker Aktif: 0 popup diblokir</div>
    
    <iframe id="player-layer" 
            sandbox="allow-scripts allow-same-origin allow-forms"
            allow="autoplay; encrypted-media"
            style="width: 100vw; height: 100vh; border: none;">
    </iframe>
    
    <div id="kill-switch-layer"></div>

    <script>
        (function() {
            'use strict';
            
            // ===== KONFIGURASI =====
            const BLOCKED_KEYWORDS = [
                'effectivegatecpm',
                'pl25835327',
                'doubleclick',
                'googleadservices',
                'popup',
                'adserver',
                'adservice',
                'advertising',
                'analytics',
                'tracking',
                'beacon',
                'pixel'
            ];
            
            let popupCount = 0;
            let isInitialized = false;
            
            // ===== AMBIL URL =====
            function getTargetUrl() {
                // Method 1: Cari parameter di URL
                const urlParams = new URLSearchParams(window.location.search);
                let url = urlParams.get('link') || urlParams.get('url');
                
                if (url) {
                    try {
                        url = decodeURIComponent(url);
                        new URL(url); // Validasi
                        return url;
                    } catch(e) {}
                }
                
                // Method 2: Cek hash
                if (window.location.hash) {
                    try {
                        url = decodeURIComponent(window.location.hash.substring(1));
                        new URL(url);
                        return url;
                    } catch(e) {}
                }
                
                return null;
            }
            
            const targetUrl = getTargetUrl();
            
            if (!targetUrl) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-message').style.display = 'block';
                document.getElementById('error-message').innerHTML = '❌ URL tidak ditemukan<br><small>URL harus diberikan melalui parameter ?link= atau ?url=</small>';
                return;
            }
            
            // ===== STRATEGI 1: MATIKAN SEMUA FUNGSI BERBAHAYA =====
            function executeInIframe(iframe, code) {
                try {
                    const win = iframe.contentWindow;
                    const doc = iframe.contentDocument;
                    
                    if (!win || !doc) return false;
                    
                    // Suntikkan script ke iframe
                    const script = doc.createElement('script');
                    script.textContent = `
                        (function() {
                            ${code}
                        })();
                    `;
                    doc.head.appendChild(script);
                    return true;
                } catch(e) {
                    console.log('Gagal eksekusi di iframe:', e);
                    return false;
                }
            }
            
            // ===== STRATEGI 2: BUAT PERANGKAP POPUP GLOBAL =====
            function setupGlobalTraps() {
                // Trap di window utama
                const originalOpen = window.open;
                const originalAlert = window.alert;
                const originalConfirm = window.confirm;
                const originalPrompt = window.prompt;
                
                window.open = function() {
                    popupCount++;
                    updateStats();
                    showPopupAlert();
                    console.log('🚫 Popup diblokir! Total:', popupCount);
                    return null;
                };
                
                window.alert = window.confirm = window.prompt = function() {
                    popupCount++;
                    updateStats();
                    showPopupAlert();
                    return false;
                };
                
                // Blokir semua event navigasi
                document.addEventListener('click', function(e) {
                    const target = e.target.closest('a');
                    if (target && target.target === '_blank') {
                        const href = target.href;
                        if (BLOCKED_KEYWORDS.some(keyword => href.includes(keyword))) {
                            e.preventDefault();
                            e.stopPropagation();
                            popupCount++;
                            updateStats();
                            showPopupAlert();
                        }
                    }
                }, true);
                
                // Blokir beforeunload (popunder)
                window.addEventListener('beforeunload', function(e) {
                    popupCount++;
                    updateStats();
                    showPopupAlert();
                    e.preventDefault();
                    e.returnValue = '';
                    return '';
                });
            }
            
            // ===== STRATEGI 3: SUNTIKKAN ANTI-POPUP KE IFRAME =====
            function injectAntiPopupCode(iframe) {
                const antiPopupCode = `
                    // Hancurkan semua fungsi pembuat popup
                    window.open = window.alert = window.confirm = window.prompt = window.print = function() { 
                        if (window.parent) window.parent.postMessage('popup-blocked', '*');
                        return null; 
                    };
                    
                    // Blokir pembuatan iframe tersembunyi
                    const createElement = document.createElement;
                    document.createElement = function(tag) {
                        const el = createElement.call(document, tag);
                        
                        if (tag.toLowerCase() === 'iframe' || tag.toLowerCase() === 'script') {
                            return new Proxy(el, {
                                set: function(obj, prop, value) {
                                    if (prop === 'src' || prop === 'srcdoc') {
                                        if (typeof value === 'string') {
                                            const blocked = ${JSON.stringify(BLOCKED_KEYWORDS)};
                                            if (blocked.some(k => value.includes(k))) {
                                                console.log('🧹 Elemen berbahaya diblokir:', value);
                                                window.parent.postMessage('element-blocked', '*');
                                                return true;
                                            }
                                        }
                                    }
                                    obj[prop] = value;
                                    return true;
                                }
                            });
                        }
                        return el;
                    };
                    
                    // Bersihkan setiap 100ms
                    setInterval(function() {
                        // Hapus semua iframe tersembunyi
                        document.querySelectorAll('iframe').forEach(iframe => {
                            const style = window.getComputedStyle(iframe);
                            if (style.display === 'none' || style.visibility === 'hidden' || iframe.offsetWidth === 0) {
                                if (!iframe.src || !iframe.src.includes('bitmovin')) {
                                    iframe.remove();
                                    window.parent.postMessage('iframe-removed', '*');
                                }
                            }
                        });
                        
                        // Hapus div popup
                        document.querySelectorAll('div').forEach(div => {
                            if (div.style.position === 'fixed' || div.style.position === 'absolute') {
                                if (div.offsetWidth > 100 && div.offsetHeight > 50) {
                                    if (div.innerHTML.includes('iklan') || div.innerHTML.includes('klik')) {
                                        div.remove();
                                    }
                                }
                            }
                        });
                    }, 100);
                `;
                
                executeInIframe(iframe, antiPopupCode);
            }
            
            // ===== STRATEGI 4: INTERCEPT POST MESSAGE =====
            window.addEventListener('message', function(event) {
                if (event.data === 'popup-blocked' || event.data === 'element-blocked' || event.data === 'iframe-removed') {
                    popupCount++;
                    updateStats();
                    showPopupAlert();
                }
            });
            
            // ===== UTILITY FUNCTIONS =====
            function showPopupAlert() {
                const alert = document.getElementById('popup-alert');
                alert.style.display = 'block';
                setTimeout(() => {
                    alert.style.display = 'none';
                }, 500);
            }
            
            function updateStats() {
                const stats = document.getElementById('blocker-stats');
                stats.style.display = 'block';
                stats.innerHTML = `🛡️ Blocker Aktif: ${popupCount} popup diblokir`;
            }
            
            // ===== STRATEGI 5: CONTENT SECURITY POLICY =====
            function setupCSP() {
                const meta = document.createElement('meta');
                meta.httpEquiv = 'Content-Security-Policy';
                meta.content = "default-src 'self' * data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' *; frame-src *; popup-src 'none';";
                document.head.appendChild(meta);
            }
            
            // ===== STRATEGI 6: PERIODIC CLEANUP =====
            function startPeriodicCleanup() {
                setInterval(() => {
                    // Cek apakah ada window baru terbuka
                    if (window.top && window.top.document !== document) {
                        // Kita berada di popup, coba tutup
                        try {
                            window.close();
                            popupCount++;
                            updateStats();
                        } catch(e) {}
                    }
                    
                    // Cek elemen mencurigakan di halaman utama
                    const suspiciousElements = document.querySelectorAll('[onclick*="open"], [onclick*="popup"], [target="_blank"]');
                    suspiciousElements.forEach(el => {
                        if (el.href && BLOCKED_KEYWORDS.some(k => el.href.includes(k))) {
                            el.removeAttribute('target');
                            el.removeAttribute('onclick');
                        }
                    });
                    
                }, 200);
            }
            
            // ===== STRATEGI 7: EVENT CAPTURE =====
            function setupEventCapture() {
                document.addEventListener('mouseup', function(e) {
                    if (e.button === 1) { // Middle click
                        e.preventDefault();
                        e.stopPropagation();
                        showPopupAlert();
                    }
                }, true);
                
                document.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    return false;
                }, true);
            }
            
            // ===== INITIALIZATION =====
            async function init() {
                console.log('🛡️ Mengaktifkan Zero-Popup Protection');
                
                // Setup semua proteksi
                setupCSP();
                setupGlobalTraps();
                setupEventCapture();
                startPeriodicCleanup();
                
                // Muat konten ke iframe
                const playerLayer = document.getElementById('player-layer');
                
                // Coba muat dengan berbagai metode
                try {
                    // Method 1: Langsung
                    playerLayer.src = targetUrl;
                    
                    // Tunggu iframe load
                    playerLayer.onload = function() {
                        if (!isInitialized) {
                            isInitialized = true;
                            
                            // Suntikkan anti-popup ke dalam iframe
                            setTimeout(() => {
                                injectAntiPopupCode(playerLayer);
                            }, 1000);
                            
                            // Suntikkan lagi setiap 3 detik
                            setInterval(() => {
                                if (playerLayer.contentDocument) {
                                    injectAntiPopupCode(playerLayer);
                                }
                            }, 3000);
                            
                            // Sembunyikan loading
                            document.getElementById('loading').style.display = 'none';
                        }
                    };
                    
                } catch(e) {
                    console.error('Gagal memuat:', e);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('error-message').style.display = 'block';
                    document.getElementById('error-message').innerHTML = '❌ Gagal memuat: ' + e.message;
                }
            }
            
            // Mulai
            init();
            
        })();
    </script>
</body>
</html>
