<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embed Clean Player - No Popup</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: black;
            font-family: Arial, sans-serif;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            z-index: 1000;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(255,0,0,0.7);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 1001;
        }
        #video-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: none;
        }
        #video-player {
            width: 100%;
            height: 100%;
            border: none;
        }
        #popup-blocker-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 9999;
            pointer-events: none;
        }
        .blocker-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #ff4444;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 10000;
            border: 1px solid #ff4444;
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Memuat konten...</div>
    </div>
    <div id="error-message"></div>
    
    <div id="video-container">
        <iframe id="video-player" 
                sandbox="allow-same-origin allow-scripts allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-downloads"
                allow="autoplay; encrypted-media; picture-in-picture"
                allowfullscreen>
        </iframe>
    </div>
    
    <div id="popup-blocker-overlay"></div>
    <div id="blocker-message" class="blocker-message">🚫 Popup diblokir!</div>

    <script>
        (function() {
            'use strict';
            
            // Konfigurasi
            const BLOCKED_DOMAINS = [
                'effectivegatecpm.com',
                'pl25835327.effectivegatecpm.com',
                'go.effectivegatecpm.com',
                'cdn.effectivegatecpm.com',
                'popup',
                'adserver',
                'doubleclick',
                'googleadservices'
            ];
            
            // Ambil URL target
            const urlParams = new URLSearchParams(window.location.search);
            let targetUrl = urlParams.get('url');
            
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error-message');
            const videoContainer = document.getElementById('video-container');
            const videoPlayer = document.getElementById('video-player');
            const blockerMessage = document.getElementById('blocker-message');
            
            if (!targetUrl) {
                showError('Tidak ada URL yang diberikan');
                return;
            }
            
            try {
                targetUrl = decodeURIComponent(targetUrl);
                new URL(targetUrl);
            } catch (e) {
                showError('URL tidak valid');
                return;
            }
            
            function showError(message) {
                loadingEl.style.display = 'none';
                errorEl.textContent = message;
                errorEl.style.display = 'block';
            }
            
            // Fungsi untuk menampilkan notifikasi popup diblokir
            function showBlockerNotification() {
                blockerMessage.style.display = 'block';
                setTimeout(() => {
                    blockerMessage.style.display = 'none';
                }, 2000);
            }
            
            // STRATEGI 1: Override fungsi popup di window utama
            (function blockPopups() {
                // Simpan referensi asli
                const originalOpen = window.open;
                const originalAlert = window.alert;
                const originalConfirm = window.confirm;
                const originalPrompt = window.prompt;
                
                // Blokir window.open
                window.open = function(url, name, features) {
                    if (url && BLOCKED_DOMAINS.some(domain => url.includes(domain))) {
                        console.log('[Popup Blocked]', url);
                        showBlockerNotification();
                        return null;
                    }
                    // Untuk URL yang aman, tetap izinkan tapi tangkap
                    if (url) {
                        try {
                            const urlObj = new URL(url, window.location.origin);
                            if (!BLOCKED_DOMAINS.some(domain => urlObj.hostname.includes(domain))) {
                                return originalOpen.call(window, url, name, features);
                            }
                        } catch (e) {
                            // URL relatif
                            if (!BLOCKED_DOMAINS.some(domain => url.includes(domain))) {
                                return originalOpen.call(window, url, name, features);
                            }
                        }
                    }
                    showBlockerNotification();
                    return null;
                };
                
                // Blokir dialog yang sering digunakan iklan
                window.alert = function(message) {
                    if (message && message.toLowerCase().includes('ad') || 
                        message && message.toLowerCase().includes('iklan')) {
                        showBlockerNotification();
                        return;
                    }
                    return originalAlert.call(window, message);
                };
                
                window.confirm = function(message) {
                    if (message && (message.toLowerCase().includes('ad') || 
                        message.toLowerCase().includes('iklan'))) {
                        showBlockerNotification();
                        return false;
                    }
                    return originalConfirm.call(window, message);
                };
                
                window.prompt = function(message) {
                    if (message && (message.toLowerCase().includes('ad') || 
                        message.toLowerCase().includes('iklan'))) {
                        showBlockerNotification();
                        return null;
                    }
                    return originalPrompt.call(window, message);
                };
            })();
            
            // STRATEGI 2: Blokir event yang memicu popup
            document.addEventListener('click', function(e) {
                const target = e.target;
                if (target.tagName === 'A' && target.target === '_blank') {
                    const href = target.href;
                    if (href && BLOCKED_DOMAINS.some(domain => href.includes(domain))) {
                        e.preventDefault();
                        e.stopPropagation();
                        showBlockerNotification();
                        console.log('[Link Blocked]', href);
                    }
                }
            }, true);
            
            // STRATEGI 3: Blokir attempt navigasi yang mencurigakan
            let lastLocationChange = Date.now();
            const originalPushState = history.pushState;
            const originalReplaceState = history.replaceState;
            
            history.pushState = function(state, title, url) {
                if (url && typeof url === 'string' && BLOCKED_DOMAINS.some(domain => url.includes(domain))) {
                    console.log('[PushState Blocked]', url);
                    showBlockerNotification();
                    return;
                }
                return originalPushState.apply(this, arguments);
            };
            
            history.replaceState = function(state, title, url) {
                if (url && typeof url === 'string' && BLOCKED_DOMAINS.some(domain => url.includes(domain))) {
                    console.log('[ReplaceState Blocked]', url);
                    showBlockerNotification();
                    return;
                }
                return originalReplaceState.apply(this, arguments);
            };
            
            // STRATEGI 4: Gunakan proxy dengan intercept request
            async function loadContent() {
                try {
                    // Coba beberapa proxy untuk redundansi
                    const proxies = [
                        `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
                        `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,
                        `https://thingproxy.freeboard.io/fetch/${encodeURIComponent(targetUrl)}`
                    ];
                    
                    let html = null;
                    let proxyUsed = null;
                    
                    // Coba proxy satu per satu
                    for (const proxy of proxies) {
                        try {
                            const response = await fetch(proxy, { 
                                timeout: 10000,
                                headers: {
                                    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                                }
                            });
                            if (response.ok) {
                                html = await response.text();
                                proxyUsed = proxy;
                                break;
                            }
                        } catch (e) {
                            console.log('Proxy gagal:', proxy, e);
                            continue;
                        }
                    }
                    
                    if (!html) {
                        throw new Error('Semua proxy gagal');
                    }
                    
                    // Bersihkan HTML secara agresif
                    
                    // 1. Hapus semua script yang mencurigakan
                    BLOCKED_DOMAINS.forEach(domain => {
                        const patterns = [
                            `<script[^>]*src=["'][^"']*${domain.replace(/\./g, '\\.')}[^"']*["'][^>]*>\\s*<\\/script>`,
                            `<script[^>]*>[^<]*${domain.replace(/\./g, '\\.')}[^<]*<\\/script>`,
                            `<iframe[^>]*src=["'][^"']*${domain.replace(/\./g, '\\.')}[^"']*["'][^>]*>\\s*<\\/iframe>`,
                            `<a[^>]*href=["'][^"']*${domain.replace(/\./g, '\\.')}[^"']*["'][^>]*>.*?<\\/a>`
                        ];
                        
                        patterns.forEach(pattern => {
                            const regex = new RegExp(pattern, 'gi');
                            html = html.replace(regex, '');
                        });
                    });
                    
                    // 2. Hapus event handler yang mencurigakan
                    const suspiciousEvents = ['onclick', 'onload', 'onmouseover', 'onfocus', 'onblur'];
                    suspiciousEvents.forEach(event => {
                        const regex = new RegExp(`${event}=["'][^"']*?(window\\.open|popup|ad|\\.open\\(|https?://)[^"']*?["']`, 'gi');
                        html = html.replace(regex, '');
                    });
                    
                    // 3. Suntikkan script anti-popup yang super ketat
                    const antiPopupScript = `
                        <script>
                            (function() {
                                // Hancurkan semua fungsi yang bisa buat popup
                                const noop = function() { return null; };
                                const blockFunctions = [
                                    'open', 'alert', 'confirm', 'prompt', 'print',
                                    'showModalDialog', 'showModelessDialog'
                                ];
                                
                                blockFunctions.forEach(func => {
                                    try {
                                        window[func] = noop;
                                    } catch(e) {}
                                });
                                
                                // Override createElement untuk cegah iframe tersembunyi
                                const originalCreateElement = document.createElement;
                                document.createElement = function(tagName) {
                                    const el = originalCreateElement.call(document, tagName);
                                    
                                    if (tagName.toLowerCase() === 'iframe') {
                                        // Buat iframe tidak berbahaya
                                        setTimeout(() => {
                                            try {
                                                el.style.display = 'none';
                                                el.width = '0';
                                                el.height = '0';
                                                if (el.contentWindow) {
                                                    blockFunctions.forEach(func => {
                                                        try {
                                                            el.contentWindow[func] = noop;
                                                        } catch(e) {}
                                                    });
                                                }
                                            } catch(e) {}
                                        }, 0);
                                    }
                                    
                                    return el;
                                };
                                
                                // Periodic cleaner
                                setInterval(function() {
                                    // Hapus semua iframe tersembunyi
                                    const iframes = document.querySelectorAll('iframe');
                                    iframes.forEach(iframe => {
                                        const style = window.getComputedStyle(iframe);
                                        if (style.display === 'none' || 
                                            style.visibility === 'hidden' ||
                                            iframe.width === '0' ||
                                            iframe.height === '0' ||
                                            iframe.offsetWidth === 0 ||
                                            iframe.offsetHeight === 0) {
                                            if (!iframe.closest('#video-player')) {
                                                iframe.remove();
                                            }
                                        }
                                    });
                                    
                                    // Hapus div popup
                                    const divs = document.querySelectorAll('div');
                                    divs.forEach(div => {
                                        if (div.style.position === 'fixed' || 
                                            div.style.position === 'absolute') {
                                            const html = div.outerHTML.toLowerCase();
                                            if (html.includes('ad') || 
                                                html.includes('popup') || 
                                                html.includes('iklan')) {
                                                div.remove();
                                            }
                                        }
                                    });
                                }, 500);
                            })();
                        <\/script>
                    `;
                    
                    // Sisipkan anti-popup script
                    html = html.replace('<head>', '<head>' + antiPopupScript);
                    
                    // 4. Gunakan teknik sandbox ganda
                    const blob = new Blob([html], { type: 'text/html' });
                    const blobUrl = URL.createObjectURL(blob);
                    
                    // Set iframe src ke blob URL
                    videoPlayer.src = blobUrl;
                    
                    // Tampilkan video container
                    loadingEl.style.display = 'none';
                    videoContainer.style.display = 'block';
                    
                    // Bersihkan blob URL setelah digunakan
                    videoPlayer.onload = function() {
                        URL.revokeObjectURL(blobUrl);
                    };
                    
                } catch (error) {
                    console.error('Error detail:', error);
                    showError('Gagal memuat: ' + error.message);
                    
                    // Fallback: langsung akses URL dengan proteksi
                    videoPlayer.src = targetUrl;
                    loadingEl.style.display = 'none';
                    videoContainer.style.display = 'block';
                }
            }
            
            // STRATEGI 5: Intercept semua pesan postMessage yang mencurigakan
            window.addEventListener('message', function(event) {
                if (event.data && typeof event.data === 'string') {
                    if (event.data.includes('popup') || event.data.includes('ad')) {
                        event.stopImmediatePropagation();
                        showBlockerNotification();
                    }
                }
            }, true);
            
            // Mulai loading
            loadContent();
            
            // Periodic check untuk popup
            setInterval(function() {
                // Deteksi jika ada popup terbuka
                if (window.top && window.top.document !== document) {
                    // Kita berada di popup, coba tutup
                    try {
                        window.close();
                    } catch(e) {}
                }
            }, 1000);
            
        })();
    </script>
</body>
</html>
