<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">

    <title>LSBTV - STREAMING GRATIS, GRATIS STREAMING</title>

    <!-- === ANTI-POPUP BLOCKER DIMULAI DI SINI ( paling atas supaya override duluan ) === -->
    <script>
    (function blockStreamingPopups() {
        'use strict';

        // Simpan fungsi asli (untuk referensi/debug jika perlu)
        const originalOpen = window.open;

        // Override utama: buat window.open selalu gagal
        window.open = function(url, name, specs, replace) {
            // Optional: uncomment jika ingin tahu siapa yang coba buka popup
            // console.log('[POPUP BLOCKED] Attempted URL:', url, 'Specs:', specs);
            return null;  // return null = gagal buka popup (banyak script cek ini)
        };

        // Beberapa situs pakai window.open sebagai property descriptor
        try {
            Object.defineProperty(window, 'open', {
                value: function() { return null; },
                writable: false,
                configurable: false
            });
        } catch(e) {
            // abaikan error jika sudah di-define
        }

        // Proteksi tambahan: cegah popunder via blur/focus trik
        window.blur = function() {};
        window.focus = function() {};

        // Hapus event listener mencurigakan di body & document (onclick, onmousedown, dll)
        function stripSuspiciousEvents(element) {
            if (!element) return;
            element.onclick = null;
            element.onmousedown = null;
            element.onmouseup = null;
            element.onauxclick = null;
            element.contextmenu = null;
            element.ondblclick = null;
        }

        stripSuspiciousEvents(document);
        stripSuspiciousEvents(document.body);
        stripSuspiciousEvents(document.documentElement);

        // Pantau elemen baru yang ditambahkan (untuk script async/late load)
        if (window.MutationObserver) {
            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.addedNodes) {
                        mutation.addedNodes.forEach((node) => {
                            if (node.nodeType === 1) {  // element node
                                stripSuspiciousEvents(node);
                            }
                        });
                    }
                });
            });
            observer.observe(document.body || document.documentElement, {
                childList: true,
                subtree: true
            });
        }

        // Re-apply override setiap 800ms (jaga-jaga kalau script iklan re-define window.open)
        setInterval(() => {
            if (window.open !== originalOpen && window.open.toString().indexOf('null') === -1) {
                window.open = function() { return null; };
            }
        }, 800);

    })();
    </script>
    <!-- === ANTI-POPUP BLOCKER SELESAI === -->

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Arjunaaaaa/lsbtv/gaya.css" />
    <script src='https://cdn.jsdelivr.net/gh/Arjunaaaaa/lsbtv/fullscreen.js' crossorigin='anonymous'></script>
    <script src='https://cdn.jsdelivr.net/gh/Arjunaaaaa/lsbtv/aspekrasio.js' crossorigin='anonymous'></script>
    <script src='https://cdn.jsdelivr.net/gh/Arjunaaaaa/lsbtv/popupwindow.js' crossorigin='anonymous'></script>

    <style>
        .konten-atas {
            position: absolute;
            top: 0;
            left: 0;
        }
        .konten-bawah {
            position: relative;
        }
        .vidio {
            margin-top: -8px;
        }
        #offline-message {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #f1f1f1;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }
        .container {
            position: relative;
        }
        .overlay {
            position: relative;
            top: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .iframe {
            border: 1px solid #000;
            border-radius: 10px;
        }
    </style>

    <script>
        window.addEventListener('load', function() {
            var online = navigator.onLine;
            function updateStatus() {
                var offlineMessage = document.getElementById('offline-message');
                offlineMessage.style.display = online ? 'none' : 'block';
            }
            updateStatus();
            window.addEventListener('online', function() {
                online = true;
                updateStatus();
            });
            window.addEventListener('offline', function() {
                online = false;
                updateStatus();
            });
            // Nama file default untuk embed (bisa diganti sesuai kebutuhan)
            var embedFile = 'embed.html'; // Ganti dengan nama file yang diinginkan
            // Ambil parameter 'link' dari query string
            var urlParams = new URLSearchParams(window.location.search);
            var embedUrl = urlParams.get('link');
            // Set src iframe secara dinamis
            var iframe = document.getElementById('vidio');
            if (embedUrl) {
                iframe.src = embedFile + '?url=' + encodeURIComponent(embedUrl);
            } else {
                // Fallback jika tidak ada parameter link
                iframe.src = embedFile + '?url=';
                offlineMessage.style.display = 'block';
                offlineMessage.innerHTML = '<h2>Error</h2><p>Tidak ada URL embed yang diberikan.</p>';
            }
        });
    </script>
</head>
<body bgcolor='black' style='margin:0' oncontextmenu='return false' onkeydown='return false' onmousedown='return false'>
    <div class="konten-bawah">
        <iframe class="vidio" id="vidio" width="100%" height="100%" margin
                title="Lsbt"
                sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen></iframe>
    </div>
    <div class="konten-atas">
        <marquee bgcolor="black" style="color: black; font-family: arial; font-size: 40px;"> </marquee>
    </div>
    <div id="offline-message">
        <h2></h2>
        <p></p>
    </div>
    <script>
        var iframe = document.getElementById('vidio');
        var offlineMessage = document.getElementById('offline-message');
        iframe.addEventListener('load', function() {
            var online = navigator.onLine;
            if (!online) {
                offlineMessage.style.display = 'block';
                iframe.style.display = 'none';
            }
        });
        var online = navigator.onLine;
        if (!online) {
            offlineMessage.style.display = 'block';
            iframe.style.display = 'none';
        }
    </script>
</body>
</html>
