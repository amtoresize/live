<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embed Clean Player</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: black;
            font-family: Arial, sans-serif;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            z-index: 1000;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(255,0,0,0.7);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 1001;
        }
        #content-frame {
            width: 100vw;
            height: 100vh;
            border: none;
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Memuat konten...</div>
    </div>
    <div id="error-message"></div>
    <iframe id="content-frame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads"></iframe>

    <script>
        (function() {
            'use strict';
            
            // Daftar domain iklan yang akan diblokir
            const BLOCKED_DOMAINS = [
                'effectivegatecpm.com',
                'pl25835327.effectivegatecpm.com',
                'go.effectivegatecpm.com',
                'cdn.effectivegatecpm.com'
            ];
            
            // URL target dari parameter
            const urlParams = new URLSearchParams(window.location.search);
            let targetUrl = urlParams.get('url');
            
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error-message');
            const contentFrame = document.getElementById('content-frame');
            
            if (!targetUrl) {
                showError('Tidak ada URL yang diberikan');
                return;
            }
            
            // Pastikan URL valid
            try {
                targetUrl = decodeURIComponent(targetUrl);
                new URL(targetUrl); // Validasi URL
            } catch (e) {
                showError('URL tidak valid');
                return;
            }
            
            // Fungsi untuk menampilkan error
            function showError(message) {
                loadingEl.style.display = 'none';
                errorEl.textContent = message;
                errorEl.style.display = 'block';
            }
            
            // Fungsi untuk memblokir request ke domain tertentu
            function blockAdRequests(frame) {
                try {
                    // Override fetch dan XHR untuk memblokir request
                    const originalFetch = window.fetch;
                    const originalXHROpen = XMLHttpRequest.prototype.open;
                    const originalXHRSend = XMLHttpRequest.prototype.send;
                    
                    // Blokir fetch requests
                    window.fetch = function(input, init) {
                        const url = typeof input === 'string' ? input : input.url;
                        if (isBlockedDomain(url)) {
                            console.log('[Blocker] Fetch diblokir:', url);
                            return Promise.reject(new Error('Request diblokir oleh ad blocker'));
                        }
                        return originalFetch.apply(this, arguments);
                    };
                    
                    // Blokir XMLHttpRequest
                    XMLHttpRequest.prototype.open = function(method, url, async, user, password) {
                        if (isBlockedDomain(url)) {
                            console.log('[Blocker] XHR diblokir:', url);
                            this._blocked = true;
                            // Buat error palsu
                            setTimeout(() => {
                                this.onerror && this.onerror(new Error('Request diblokir'));
                            }, 0);
                            return;
                        }
                        this._url = url;
                        return originalXHROpen.apply(this, arguments);
                    };
                    
                    XMLHttpRequest.prototype.send = function() {
                        if (this._blocked) return;
                        return originalXHRSend.apply(this, arguments);
                    };
                    
                    // Blokir pembuatan elemen script dari domain terlarang
                    const originalCreateElement = document.createElement;
                    document.createElement = function(tagName) {
                        const element = originalCreateElement.call(document, tagName);
                        
                        if (tagName.toLowerCase() === 'script') {
                            // Intercept attribute setter untuk src
                            let src = '';
                            Object.defineProperty(element, 'src', {
                                get: function() { return src; },
                                set: function(value) {
                                    if (isBlockedDomain(value)) {
                                        console.log('[Blocker] Script diblokir:', value);
                                        // Kembalikan elemen dummy yang tidak melakukan apa-apa
                                        return;
                                    }
                                    src = value;
                                    // Set properti asli
                                    setTimeout(() => {
                                        element.setAttribute('src', value);
                                    }, 0);
                                }
                            });
                        }
                        
                        return element;
                    };
                    
                    // Juga intercept appendChild untuk script yang sudah dibuat
                    const originalAppendChild = Node.prototype.appendChild;
                    Node.prototype.appendChild = function(child) {
                        if (child.tagName === 'SCRIPT' && child.src && isBlockedDomain(child.src)) {
                            console.log('[Blocker] Append script diblokir:', child.src);
                            return child; // Kembalikan tanpa menambahkan
                        }
                        return originalAppendChild.call(this, child);
                    };
                    
                } catch (e) {
                    console.error('Error setting up blocker:', e);
                }
            }
            
            // Helper untuk cek apakah URL termasuk domain terblokir
            function isBlockedDomain(url) {
                if (!url || typeof url !== 'string') return false;
                try {
                    const urlObj = new URL(url, window.location.origin);
                    return BLOCKED_DOMAINS.some(domain => 
                        urlObj.hostname.includes(domain) || 
                        url.includes(domain)
                    );
                } catch (e) {
                    // Jika URL relatif, cek stringnya
                    return BLOCKED_DOMAINS.some(domain => url.includes(domain));
                }
            }
            
            // Fungsi untuk membersihkan elemen iklan setelah halaman dimuat
            function cleanAdElements() {
                try {
                    // Hapus elemen script yang berasal dari domain terblokir
                    const scripts = document.querySelectorAll('script');
                    scripts.forEach(script => {
                        if (script.src && isBlockedDomain(script.src)) {
                            console.log('[Cleaner] Menghapus script:', script.src);
                            script.remove();
                        }
                    });
                    
                    // Hapus iframe iklan
                    const iframes = document.querySelectorAll('iframe');
                    iframes.forEach(iframe => {
                        if (iframe.src && isBlockedDomain(iframe.src)) {
                            console.log('[Cleaner] Menghapus iframe:', iframe.src);
                            iframe.remove();
                        }
                    });
                    
                    // Hapus elemen dengan atribut data yang mencurigakan
                    const adSelectors = [
                        '[class*="ad"]',
                        '[class*="ads"]',
                        '[class*="banner"]',
                        '[id*="ad"]',
                        '[id*="ads"]',
                        '[id*="banner"]'
                    ];
                    
                    adSelectors.forEach(selector => {
                        const elements = document.querySelectorAll(selector);
                        elements.forEach(el => {
                            // Cek apakah elemen ini berasal dari domain iklan
                            const html = el.outerHTML;
                            if (BLOCKED_DOMAINS.some(domain => html.includes(domain))) {
                                console.log('[Cleaner] Menghapus elemen iklan');
                                el.remove();
                            }
                        });
                    });
                    
                } catch (e) {
                    console.error('Error cleaning ad elements:', e);
                }
            }
            
            // Fungsi utama untuk memuat konten
            async function loadContent() {
                try {
                    // Gunakan proxy untuk mengambil konten
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;
                    
                    const response = await fetch(proxyUrl);
                    if (!response.ok) throw new Error('Gagal mengambil konten');
                    
                    let html = await response.text();
                    
                    // Bersihkan HTML dari skrip iklan
                    BLOCKED_DOMAINS.forEach(domain => {
                        // Hapus script tags yang mengandung domain iklan
                        const scriptRegex = new RegExp(`<script[^>]*src=["'][^"']*${domain.replace(/\./g, '\\.')}[^"']*["'][^>]*>\\s*<\\/script>`, 'gi');
                        html = html.replace(scriptRegex, '');
                        
                        // Hapus script inline yang memuat domain iklan
                        const inlineScriptRegex = new RegExp(`<script[^>]*>[^<]*${domain.replace(/\./g, '\\.')}[^<]*<\\/script>`, 'gi');
                        html = html.replace(inlineScriptRegex, '');
                        
                        // Hapus iframe yang memuat domain iklan
                        const iframeRegex = new RegExp(`<iframe[^>]*src=["'][^"']*${domain.replace(/\./g, '\\.')}[^"']*["'][^>]*>\\s*<\\/iframe>`, 'gi');
                        html = html.replace(iframeRegex, '');
                        
                        // Hapus link tags yang memuat domain iklan
                        const linkRegex = new RegExp(`<link[^>]*href=["'][^"']*${domain.replace(/\./g, '\\.')}[^"']*["'][^>]*>`, 'gi');
                        html = html.replace(linkRegex, '');
                    });
                    
                    // Suntikkan script blocker ke dalam HTML
                    const blockerScript = `
                        <script>
                            (function() {
                                // Definisikan ulang fungsi blocker di dalam frame
                                const BLOCKED_DOMAINS = ${JSON.stringify(BLOCKED_DOMAINS)};
                                
                                function isBlockedDomain(url) {
                                    if (!url) return false;
                                    return BLOCKED_DOMAINS.some(domain => url.includes(domain));
                                }
                                
                                // Override fetch
                                const originalFetch = window.fetch;
                                window.fetch = function(input, init) {
                                    const url = typeof input === 'string' ? input : input.url;
                                    if (isBlockedDomain(url)) {
                                        return Promise.reject(new Error('Blocked'));
                                    }
                                    return originalFetch.apply(this, arguments);
                                };
                                
                                // Override XHR
                                const originalXHROpen = XMLHttpRequest.prototype.open;
                                XMLHttpRequest.prototype.open = function(method, url) {
                                    if (isBlockedDomain(url)) {
                                        this.abort();
                                        return;
                                    }
                                    return originalXHROpen.apply(this, arguments);
                                };
                                
                                // Blokir pembuatan elemen script
                                const originalCreateElement = document.createElement;
                                document.createElement = function(tagName) {
                                    const element = originalCreateElement.call(document, tagName);
                                    if (tagName.toLowerCase() === 'script') {
                                        Object.defineProperty(element, 'src', {
                                            set: function(value) {
                                                if (isBlockedDomain(value)) return;
                                                element.setAttribute('src', value);
                                            }
                                        });
                                    }
                                    return element;
                                };
                                
                                // Hapus elemen iklan yang sudah ada
                                setInterval(function() {
                                    const scripts = document.querySelectorAll('script[src]');
                                    scripts.forEach(s => {
                                        if (isBlockedDomain(s.src)) s.remove();
                                    });
                                    
                                    const iframes = document.querySelectorAll('iframe[src]');
                                    iframes.forEach(i => {
                                        if (isBlockedDomain(i.src)) i.remove();
                                    });
                                }, 1000);
                            })();
                        <\/script>
                    `;
                    
                    // Sisipkan blocker script di awal head
                    html = html.replace('<head>', '<head>' + blockerScript);
                    
                    // Tulis ke iframe
                    const iframeDoc = contentFrame.contentDocument || contentFrame.contentWindow.document;
                    iframeDoc.open();
                    iframeDoc.write(html);
                    iframeDoc.close();
                    
                    // Sembunyikan loading dan tampilkan frame
                    loadingEl.style.display = 'none';
                    contentFrame.style.display = 'block';
                    
                } catch (error) {
                    console.error('Error:', error);
                    showError('Gagal memuat konten: ' + error.message);
                }
            }
            
            // Mulai memuat konten
            loadContent();
            
        })();
    </script>
</body>
</html>
