<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <meta name="referrer" content="same-origin">
    <title>LSBTV - BEBAS IKLAN</title>

    <!-- === ANTI IKLAN SUPER LENGKAP === -->
    <script>
    (function ultimateAdBlocker() {
        'use strict';
        
        // ========== 1. DAFTAR HITAM SCRIPT IKLAN ==========
        const blockedScripts = [
            // Script iklan dari player Anda
            'pisionx.pages.dev/dazn.js',
            'pl25835327.effectivegatecpm.com',
            'effectivegatecpm.com',
            
            // Domain iklan umum
            'doubleclick.net',
            'googleadservices.com',
            'googlesyndication.com',
            'popads.net',
            'propellerads.com', 
            'exoclick.com',
            'adf.ly',
            'shorte.st',
            'bc.vc'
        ];

        // ========== 2. HACK: TANGKAP SEMUA PEMBUATAN SCRIPT ==========
        // Simpan fungsi asli
        const originalCreateElement = document.createElement;
        
        // Override createElement
        document.createElement = function(tagName) {
            const element = originalCreateElement.call(document, tagName);
            
            // Khusus untuk tag script, kita awasi
            if (tagName.toLowerCase() === 'script') {
                // Simpan properti src asli
                let src = '';
                
                // Override setter untuk src
                Object.defineProperty(element, 'src', {
                    get: function() { return src; },
                    set: function(value) {
                        // Cek apakah src termasuk daftar hitam
                        const isBlocked = blockedScripts.some(domain => 
                            value.includes(domain)
                        );
                        
                        if (isBlocked) {
                            console.log('[ADBLOCK] Mencegat script iklan:', value);
                            // Jangan set src, biarkan kosong
                            src = '';
                            // Opsional: lempar error atau diam saja
                        } else {
                            src = value;
                        }
                    },
                    configurable: true
                });
            }
            
            return element;
        };

        // ========== 3. TANGKAP SCRIPT YANG SUDAH ADA ==========
        // Hapus script iklan yang sudah terlanjur dimuat
        function removeExistingAdScripts() {
            const scripts = document.querySelectorAll('script');
            scripts.forEach(script => {
                const src = script.src || '';
                
                // Cek apakah script ini dari domain iklan
                const isAdScript = blockedScripts.some(domain => 
                    src.includes(domain)
                );
                
                // Cek juga script inline yang mencurigakan
                const isInlineAd = script.textContent && (
                    script.textContent.includes('atob(') ||
                    script.textContent.includes('eval(') ||
                    script.textContent.includes('window.open') ||
                    script.textContent.includes('popunder') ||
                    script.textContent.includes('document.location')
                );
                
                if (isAdScript || isInlineAd) {
                    console.log('[ADBLOCK] Menghapus script iklan:', src || 'inline');
                    script.remove();
                }
            });
        }

        // ========== 4. BLOKIR IFRAME IKLAN ==========
        function removeAdIframes() {
            const iframes = document.querySelectorAll('iframe');
            iframes.forEach(iframe => {
                const src = iframe.src || '';
                
                // Hanya izinkan iframe player utama
                if (iframe.id === 'vidio' || iframe.classList.contains('vidio')) {
                    return;
                }
                
                // Cek apakah iframe dari domain iklan
                const isAdIframe = blockedScripts.some(domain => 
                    src.includes(domain)
                );
                
                // Cek juga iframe dengan ukuran mencurigakan
                const width = iframe.offsetWidth;
                const height = iframe.offsetHeight;
                const adSizes = [
                    [300, 250], [336, 280], [728, 90], 
                    [468, 60], [120, 600], [160, 600]
                ];
                
                const isAdSize = adSizes.some(([w, h]) => 
                    Math.abs(width - w) < 10 && Math.abs(height - h) < 10
                );
                
                if (isAdIframe || isAdSize) {
                    console.log('[ADBLOCK] Menghapus iframe iklan:', src);
                    iframe.remove();
                }
            });
        }

        // ========== 5. CSS NUKLIR UNTUK SEMBUNYIKAN IFRAME IKLAN ==========
        const style = document.createElement('style');
        style.textContent = `
            /* Sembunyikan semua elemen mencurigakan */
            iframe[src*="doubleclick"],
            iframe[src*="googlead"],
            iframe[src*="popads"],
            iframe[src*="exoclick"],
            iframe[src*="propeller"],
            iframe[src*="effectivegatecpm"],
            iframe[src*="pisionx"],
            
            /* Sembunyikan elemen dengan class/id iklan */
            [class*="ad-"], [id*="ad-"],
            [class*="ads"], [id*="ads"],
            [class*="banner"], [id*="banner"],
            [class*="popup"], [id*="popup"],
            
            /* Sembunyikan elemen yang floating/mengganggu */
            div[style*="position: fixed"],
            div[style*="position: absolute"][style*="z-index"],
            div[style*="z-index: 999"] {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
                pointer-events: none !important;
            }
            
            /* Pastikan video player tetap kelihatan */
            #vidio, .vidio, iframe[id="vidio"] {
                display: block !important;
                visibility: visible !important;
                opacity: 1 !important;
                pointer-events: auto !important;
            }
        `;
        document.head.appendChild(style);

        // ========== 6. PANTAU PERUBAHAN DOM ==========
        if (window.MutationObserver) {
            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    // Tangkap script baru
                    if (mutation.addedNodes) {
                        mutation.addedNodes.forEach((node) => {
                            if (node.nodeType === 1) { // Element node
                                // Jika node adalah script
                                if (node.tagName === 'SCRIPT') {
                                    const src = node.src || '';
                                    const isAdScript = blockedScripts.some(domain => 
                                        src.includes(domain)
                                    );
                                    
                                    if (isAdScript) {
                                        console.log('[ADBLOCK] Script baru diblokir:', src);
                                        node.remove();
                                    }
                                }
                                
                                // Jika node mengandung iframe
                                if (node.tagName === 'IFRAME') {
                                    const src = node.src || '';
                                    const isAdIframe = blockedScripts.some(domain => 
                                        src.includes(domain)
                                    );
                                    
                                    if (isAdIframe && node.id !== 'vidio') {
                                        console.log('[ADBLOCK] Iframe baru diblokir:', src);
                                        node.remove();
                                    }
                                }
                            }
                        });
                    }
                });
            });
            
            // Mulai observasi
            observer.observe(document.documentElement, {
                childList: true,
                subtree: true
            });
        }

        // ========== 7. EKSEKUSI BERKALA ==========
        setInterval(() => {
            removeExistingAdScripts();
            removeAdIframes();
        }, 500); // Cek setiap 500ms

        // Jalankan pertama kali
        setTimeout(() => {
            removeExistingAdScripts();
            removeAdIframes();
        }, 100);

        console.log('%c🚫 ADBLOCK AKTIF - Iklan akan diblokir!', 
                    'background: red; color: white; font-size: 16px;');
    })();
    </script>
    <!-- === ANTI IKLAN SELESAI === -->

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Arjunaaaaa/lsbtv/gaya.css" />
    <script src='https://cdn.jsdelivr.net/gh/Arjunaaaaa/lsbtv/fullscreen.js' crossorigin='anonymous'></script>
    <script src='https://cdn.jsdelivr.net/gh/Arjunaaaaa/lsbtv/aspekrasio.js' crossorigin='anonymous'></script>
    <script src='https://cdn.jsdelivr.net/gh/Arjunaaaaa/lsbtv/popupwindow.js' crossorigin='anonymous'></script>

    <style>
        .konten-atas { position: absolute; top: 0; left: 0; }
        .konten-bawah { position: relative; }
        .vidio { margin-top: -8px; }
        #offline-message { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: #f1f1f1; padding: 20px; border-radius: 5px; text-align: center; }
        .container { position: relative; }
        .overlay { position: relative; top: 0; display: flex; justify-content: center; align-items: center; }
        .iframe { border: 1px solid #000; border-radius: 10px; }
    </style>

    <script>
        window.addEventListener('load', function() {
            var online = navigator.onLine;
            function updateStatus() {
                var offlineMessage = document.getElementById('offline-message');
                offlineMessage.style.display = online ? 'none' : 'block';
            }
            updateStatus();
            window.addEventListener('online', function() { online = true; updateStatus(); });
            window.addEventListener('offline', function() { online = false; updateStatus(); });
            
            var embedFile = 'embed.html';
            var urlParams = new URLSearchParams(window.location.search);
            var embedUrl = urlParams.get('link');
            var iframe = document.getElementById('vidio');
            
            if (embedUrl) {
                iframe.src = embedFile + '?url=' + encodeURIComponent(embedUrl);
            } else {
                iframe.src = embedFile + '?url=';
                offlineMessage.style.display = 'block';
                offlineMessage.innerHTML = '<h2>Error</h2><p>Tidak ada URL embed yang diberikan.</p>';
            }
        });
    </script>
</head>
<body bgcolor='black' style='margin:0' oncontextmenu='return false' onkeydown='return false' onmousedown='return false'>
    <div class="konten-bawah">
        <iframe class="vidio" id="vidio" width="100%" height="100%" margin
                title="Lsbt"
                sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen></iframe>
    </div>
    <div class="konten-atas">
        <marquee bgcolor="black" style="color: black; font-family: arial; font-size: 40px;"> </marquee>
    </div>
    <div id="offline-message">
        <h2></h2>
        <p></p>
    </div>
    <script>
        var iframe = document.getElementById('vidio');
        var offlineMessage = document.getElementById('offline-message');
        iframe.addEventListener('load', function() {
            var online = navigator.onLine;
            if (!online) {
                offlineMessage.style.display = 'block';
                iframe.style.display = 'none';
            }
        });
        var online = navigator.onLine;
        if (!online) {
            offlineMessage.style.display = 'block';
            iframe.style.display = 'none';
        }
    </script>
</body>
</html>
